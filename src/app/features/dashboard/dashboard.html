<div>
    <div class="content--scroll">
        <app-dashboard-graph [graphData]="chartOptions()" />

        @if (!loading()) {
            <div class="card-list">
                <div graph class="chart-wrapper">
                    <div echarts [options]="cardChartOptions()" class="chart-container"></div>
                </div>
            </div>
        }
        @if (loading()) {
            <app-loader />
        }
    </div>
</div>
